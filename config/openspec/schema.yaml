name: forge-lite
description: Forge 精简工作流，仅保留 proposal、design、tasks 三个核心产物
version: 0.1.0

principles:
  - single_source_of_truth
  - minimal_artifacts
  - review_before_implementation
  - roles_review_only
  - skills_on_demand

stages:
  - name: proposal
    description: 明确要不要做、做什么、不做什么
    artifact: proposal
    required_roles:
      - tester
    optional_skills:
      - gstack:office-hours
      - superpowers:brainstorming
    exit_criteria:
      - scope_is_clear
      - non_goals_are_defined
      - acceptance_criteria_exist
      - risks_are_listed

  - name: design
    description: 明确怎么做、边界在哪里、风险怎么处理
    artifact: design
    depends_on:
      - proposal
    required_roles:
      - architect
      - backend
      - frontend
      - security
      - tester
    optional_skills:
      - gstack:review
    exit_criteria:
      - architecture_is_clear
      - api_contract_is_clear
      - data_model_is_clear
      - failure_modes_are_considered
      - compatibility_is_considered
      - test_strategy_exists

  - name: tasks
    description: 拆成可执行、可验收、可追踪的任务
    artifact: tasks
    depends_on:
      - design
    required_roles:
      - backend
      - frontend
      - tester
    optional_skills:
      - superpowers:test-driven-development
      - superpowers:requesting-code-review
    exit_criteria:
      - tasks_are_atomic
      - tasks_have_acceptance_checks
      - dependencies_are_clear
      - test_tasks_are_included

artifacts:
  - name: proposal
    description: 需求提案
    path: docs/forge/{change_id}/proposal.md
    owner: tester
    reviewers:
      - tester
    sections:
      - background
      - problem
      - goals
      - non_goals
      - scope
      - user_stories
      - acceptance_criteria
      - risks
      - open_questions

  - name: design
    description: 设计文档
    path: docs/forge/{change_id}/design.md
    depends_on:
      - proposal
    owner: architect
    reviewers:
      - backend
      - frontend
      - security
      - tester
    sections:
      - overview
      - architecture
      - api_contract
      - data_model
      - state_flow
      - error_handling
      - compatibility
      - security
      - observability
      - test_strategy
      - rollout_plan
      - risks

  - name: tasks
    description: 任务清单
    path: docs/forge/{change_id}/tasks.md
    depends_on:
      - design
    owner: tech_lead
    reviewers:
      - backend
      - frontend
      - tester
    sections:
      - milestones
      - backend_tasks
      - frontend_tasks
      - test_tasks
      - migration_tasks
      - observability_tasks
      - release_checks
      - verification_log

roles:
  architect:
    responsibility:
      - review_architecture
      - check_module_boundaries
      - check_data_flow
      - check_failure_modes
    active_on:
      - design

  backend:
    responsibility:
      - api_design
      - database_schema
      - concurrency
      - performance
      - error_handling
    active_on:
      - design
      - tasks

  frontend:
    responsibility:
      - ui_flow
      - state_management
      - api_contract
      - edge_cases
    active_on:
      - design
      - tasks

  tester:
    responsibility:
      - acceptance_criteria
      - test_cases
      - regression_risk
      - boundary_cases
    active_on:
      - proposal
      - design
      - tasks

  security:
    responsibility:
      - auth
      - permissions
      - input_validation
      - sensitive_data
      - abuse_cases
    active_on:
      - design

  tech_lead:
    responsibility:
      - task_split
      - dependency_order
      - implementation_sequence
      - merge_readiness
    active_on:
      - tasks

skills:
  gstack:
    default:
      - office-hours
      - review
      - investigate
      - qa-only

  superpowers:
    default:
      - test-driven-development
      - systematic-debugging
      - verification-before-completion
      - requesting-code-review
    optional:
      - brainstorming

rules:
  - proposal_must_exist_before_design
  - design_must_exist_before_tasks
  - tasks_must_not_change_scope
  - roles_can_review_but_not_replace_artifacts
  - skills_must_be_invoked_on_demand
  - brainstorming_must_not_run_in_tasks_stage
  - implementation_must_not_start_before_design_approved
  - verification_results_must_be_logged_in_tasks

gates:
  proposal:
    required_approval:
      - tester

  design:
    required_approval:
      - architect
      - backend
      - frontend
      - security
      - tester

  tasks:
    required_approval:
      - tech_lead
      - backend
      - frontend
      - tester

commands:
  proposal:
    description: 创建或更新 proposal
    invokes:
      - roles:tester
      - gstack:office-hours

  design:
    description: 基于 proposal 创建或更新 design
    invokes:
      - roles:architect
      - roles:backend
      - roles:frontend
      - roles:security
      - roles:tester
      - gstack:review

  tasks:
    description: 基于 design 拆分 tasks
    invokes:
      - roles:tech_lead
      - roles:backend
      - roles:frontend
      - roles:tester
      - superpowers:test-driven-development

  investigate:
    description: 排查实现、测试或线上问题
    invokes:
      - gstack:investigate
      - superpowers:systematic-debugging

  verify:
    description: 合并前验收
    invokes:
      - gstack:qa-only
      - superpowers:requesting-code-review
      - superpowers:verification-before-completion

status:
  allowed:
    - draft
    - review
    - approved
    - implemented
    - archived

  transitions:
    draft:
      - review
    review:
      - approved
      - draft
    approved:
      - implemented
    implemented:
      - archived
