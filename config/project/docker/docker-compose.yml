# docker-compose.yml — 本地开发全栈环境
# scaffold 生成后，所有人 docker compose up -d 启动
# backend/frontend 用 network_mode: host 共享宿主机网络，直连内网镜像源

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    network_mode: host
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/app
      REDIS_URL: redis://127.0.0.1:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    network_mode: host
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
